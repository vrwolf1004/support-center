<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MD Viewer</title>
    <!-- Marked.js 라이브러리 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 마크다운이 표시될 영역 -->
    <div id="content">Loading...</div>

    <script>
        // 1. md 파일 가져오기 (대소문자 정확히 매칭)
        fetch('README.md')
            .then(response => {
                if (!response.ok) throw new Error(`Failed to fetch README.md: ${response.status}`);
                return response.text();
            })
            .then(data => {
                // 2. 마크다운을 HTML로 변환하여 div에 삽입
                document.getElementById('content').innerHTML = marked.parse(data);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('content').textContent = '문서를 불러오지 못했습니다.';
            });
    </script>
</body>
</html>
