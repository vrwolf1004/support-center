<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center</title>
    <!-- 테마 토큰 + 스타일 -->
    <link rel="stylesheet" href="theme/artnouveau.css">
    <link rel="stylesheet" href="theme/style.css">
    <!-- Marked.js 라이브러리 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav id="nav">
        <div class="nav-inner">
            <h3>Support Center</h3>
            <div id="lang-switcher">
                <button class="lang-btn active" data-lang="ko">한국어</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>
            <ul id="nav-list"></ul>
        </div>
    </nav>
    <main>
        <div id="content">Loading...</div>
    </main>

    <script>
        // 다국어 메시지
        const i18nMessages = {
            ko: {
                loadFail: '문서 목록을 불러오지 못했습니다.',
                docFail: '문서를 불러오지 못했습니다.'
            },
            en: {
                loadFail: 'Failed to load page list.',
                docFail: 'Failed to load document.'
            }
        };

        // 현재 언어 상태
        let currentLang = localStorage.getItem('lang') || 'ko';

        // 언어 전환 버튼 이벤트
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                localStorage.setItem('lang', currentLang);
                updateLangUI();
                loadPages();
            });
        });

        function updateLangUI() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
        }

        // 페이지 목록 로드
        async function loadPages() {
            try {
                const res = await fetch(`pages.${currentLang}.json`);
                const pages = await res.json();
                const list = document.getElementById('nav-list');
                list.innerHTML = '';
                pages.forEach(p => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = '#' + encodeURIComponent(p.path);
                    a.textContent = p.title;
                    a.style.cursor = 'pointer';
                    a.dataset.path = p.path;
                    a.addEventListener('click', (ev) => {
                        ev.preventDefault();
                        navigateTo(p.path, true);
                        setActiveNav(p.path);
                    });
                    li.appendChild(a);
                    list.appendChild(li);
                });
                // initial route
                const initial = location.hash ? decodeURIComponent(location.hash.slice(1)) : `README${currentLang === 'en' ? '.en' : ''}.md`;
                navigateTo(initial, false);
                setActiveNav(initial);
            } catch (err) {
                console.error('Failed to load pages json', err);
                document.getElementById('content').textContent = i18nMessages[currentLang].loadFail;
            }
        }

        function setActiveNav(path) {
            document.querySelectorAll('#nav-list a').forEach(a => {
                a.classList.toggle('active', a.dataset.path === path);
            });
        }

        async function navigateTo(path, push) {
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
                const md = await res.text();
                document.getElementById('content').innerHTML = marked.parse(md);
                if (push) history.pushState({path}, '', '#' + encodeURIComponent(path));
            } catch (err) {
                console.error(err);
                document.getElementById('content').textContent = i18nMessages[currentLang].docFail;
            }
        }

        window.addEventListener('popstate', (e) => {
            const path = (e.state && e.state.path) || (location.hash ? decodeURIComponent(location.hash.slice(1)) : 'README.md');
            navigateTo(path, false);
            setActiveNav(path);
        });

        loadPages();
    </script>
</body>
</html>
