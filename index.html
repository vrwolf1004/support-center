<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center</title>
    <!-- 테마 토큰 + 스타일 -->
    <link rel="stylesheet" href="theme/artnouveau.css">
    <link rel="stylesheet" href="theme/style.css">
    <!-- Marked.js 라이브러리 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav id="nav">
        <div class="nav-inner">
            <h3>Support Center</h3>
            <div id="lang-switcher">
                <button class="lang-btn" data-lang="ko">한국어</button>
                <button class="lang-btn active" data-lang="en">English</button>
            </div>
            <button id="menu-toggle" class="menu-toggle">☰</button>
            <ul id="nav-list"></ul>
        </div>
    </nav>
    <div id="mobile-menu" class="mobile-menu">
        <ul id="mobile-nav-list"></ul>
    </div>
    <main>
        <div id="content">Loading...</div>
    </main>

    <script>
        // 다국어 메시지
        const i18nMessages = {
            ko: {
                loadFail: '문서 목록을 불러오지 못했습니다.',
                docFail: '문서를 불러오지 못했습니다.'
            },
            en: {
                loadFail: 'Failed to load page list.',
                docFail: 'Failed to load document.'
            }
        };

        // 현재 언어 상태 및 현재 페이지
        // 첫 방문: 영어(en), 이후 방문: localStorage에서 저장된 언어
        let currentLang = localStorage.getItem('lang') || 'en';
        let currentPath = null;

        // 모바일 메뉴 토글
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');

        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
        });

        // 모바일 메뉴 닫기
        function closeMobileMenu() {
            mobileMenu.classList.remove('active');
        }

        // 언어 전환 버튼 이벤트
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const newLang = btn.dataset.lang;
                if (currentLang === newLang) return; // 같은 언어 선택 시 무시

                currentLang = newLang;
                localStorage.setItem('lang', currentLang);
                updateLangUI();
                await loadPages();

                // 현재 페이지를 해당 언어 버전으로 전환
                if (currentPath) {
                    let newPath = currentPath;
                    // ko ↔ en 전환
                    if (currentPath.endsWith('.en.md')) {
                        // en → ko
                        newPath = currentPath.replace('.en.md', '.md');
                    } else if (currentPath.endsWith('.md')) {
                        // ko → en
                        newPath = currentPath.replace('.md', '.en.md');
                    }

                    navigateTo(newPath, false);
                    setActiveNav(newPath);
                }
            });
        });

        function updateLangUI() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
        }

        // 페이지 목록 로드
        async function loadPages() {
            try {
                const res = await fetch(`pages.${currentLang}.json`);
                const pages = await res.json();
                const list = document.getElementById('nav-list');
                const mobileList = document.getElementById('mobile-nav-list');
                list.innerHTML = '';
                mobileList.innerHTML = '';
                pages.forEach(p => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');

                    // .html 파일은 직접 링크, 마크다운은 해시 링크
                    if (p.path.endsWith('.html')) {
                        a.href = p.path;
                        a.textContent = p.title;
                        a.dataset.path = p.path;
                    } else {
                        a.href = '#' + encodeURIComponent(p.path);
                        a.textContent = p.title;
                        a.style.cursor = 'pointer';
                        a.dataset.path = p.path;
                        a.addEventListener('click', (ev) => {
                            ev.preventDefault();
                            navigateTo(p.path, true);
                            setActiveNav(p.path);
                            closeMobileMenu();
                        });
                    }

                    li.appendChild(a);
                    list.appendChild(li);

                    // 모바일 메뉴에도 같은 항목 추가
                    const mobileLi = li.cloneNode(true);
                    if (!p.path.endsWith('.html')) {
                        mobileLi.querySelector('a').addEventListener('click', (ev) => {
                            ev.preventDefault();
                            navigateTo(p.path, true);
                            setActiveNav(p.path);
                            closeMobileMenu();
                        });
                    }
                    mobileList.appendChild(mobileLi);
                });
                // initial route
                const initial = location.hash ? decodeURIComponent(location.hash.slice(1)) : `README${currentLang === 'en' ? '.en' : ''}.md`;
                navigateTo(initial, false);
                setActiveNav(initial);
            } catch (err) {
                console.error('Failed to load pages json', err);
                document.getElementById('content').textContent = i18nMessages[currentLang].loadFail;
            }
        }

        function setActiveNav(path) {
            document.querySelectorAll('#nav-list a, #mobile-nav-list a').forEach(a => {
                a.classList.toggle('active', a.dataset.path === path);
            });
        }

        async function navigateTo(path, push) {
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
                const md = await res.text();
                document.getElementById('content').innerHTML = marked.parse(md);
                currentPath = path; // 현재 페이지 업데이트
                if (push) history.pushState({path}, '', '#' + encodeURIComponent(path));
            } catch (err) {
                console.error(err);
                document.getElementById('content').textContent = i18nMessages[currentLang].docFail;
            }
        }

        window.addEventListener('popstate', (e) => {
            const path = (e.state && e.state.path) || (location.hash ? decodeURIComponent(location.hash.slice(1)) : 'README.md');
            navigateTo(path, false);
            setActiveNav(path);
        });

        loadPages();
    </script>

    <!-- Ko-fi 후원 위젯 -->
    <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
    <script>
        kofiWidgetOverlay.draw('dev_ohyt', {
            'type': 'floating-chat',
            'floating-chat.donateButton.text': 'Support me',
            'floating-chat.donateButton.background-color': '#00b9fe',
            'floating-chat.donateButton.text-color': '#fff'
        });
    </script>
</body>
</html>
