<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveau 테마 샘플</title>
  <style>
    /* ── Nouveau 테마 토큰 ── */
    :root {
      --crema-primary: #2D6A4F;
      --crema-accent: #52b788;
      --crema-bg: #fdf6e3;
      --crema-surface: #f5ebe0;
      --crema-text: #2c1810;
      --crema-text-on-primary: #ffffff;
      --crema-text-on-accent: #ffffff;
      --crema-border: #8b6914;
      --crema-radius-sm: 20px;
      --crema-radius-md: 24px;
      --crema-font: Palatino,'Book Antiqua',Georgia,serif;
      --crema-shadow: 0 4px 12px rgba(44,24,16,0.15);
      --crema-border-width: 1px;
      --crema-backdrop-filter: none;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--crema-bg);
      color: var(--crema-text);
      font-family: var(--crema-font);
      padding: 32px;
      min-height: 100vh;
    }

    h1 { font-size: 24px; margin-bottom: 8px; color: var(--crema-primary); }
    h2 { font-size: 18px; margin-bottom: 12px; color: var(--crema-text); }
    p  { font-size: 14px; line-height: 1.6; opacity: 0.8; }

    .card {
      background-color: var(--crema-surface);
      border: var(--crema-border-width) solid var(--crema-border);
      border-radius: var(--crema-radius-md);
      padding: 20px;
      box-shadow: var(--crema-shadow);
      margin-bottom: 16px;
    }

    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    button {
      appearance: none;
      border: var(--crema-border-width) solid;
      border-radius: var(--crema-radius-sm);
      padding: 8px 16px;
      font-family: var(--crema-font);
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-primary {
      background-color: var(--crema-primary);
      color: var(--crema-text-on-primary);
      border-color: var(--crema-primary);
      box-shadow: var(--crema-shadow);
    }
    .btn-accent {
      background-color: var(--crema-accent);
      color: var(--crema-text-on-accent);
      border-color: var(--crema-primary);
      box-shadow: var(--crema-shadow);
    }
    .btn-outline {
      background-color: transparent;
      color: var(--crema-primary);
      border-color: var(--crema-primary);
      box-shadow: var(--crema-shadow);
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--crema-radius-sm);
      font-size: 11px;
      font-weight: bold;
      border: var(--crema-border-width) solid var(--crema-border);
      box-shadow: 0 2px 6px rgba(44,24,16,0.1);
    }
    .badge-primary { background: var(--crema-primary); color: var(--crema-text-on-primary); }
    .badge-success { background: var(--crema-accent); color: var(--crema-text-on-accent); }
    .badge-error   { background: #c0392b; color: #ffffff; }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background-color: var(--crema-surface);
      color: var(--crema-text);
      border: var(--crema-border-width) solid var(--crema-border);
      border-radius: var(--crema-radius-sm);
      font-family: var(--crema-font);
      font-size: 14px;
      outline: none;
      margin-top: 12px;
    }
    input[type="text"]:focus {
      border-color: var(--crema-primary);
      box-shadow: var(--crema-shadow);
    }

    .progress-track {
      height: 8px;
      background: var(--crema-border);
      border-radius: var(--crema-radius-sm);
      margin-top: 12px;
      overflow: hidden;
      border: var(--crema-border-width) solid var(--crema-border);
    }
    .progress-fill {
      height: 100%;
      background: var(--crema-primary);
      border-radius: var(--crema-radius-sm);
      width: 65%;
    }

    .divider {
      border: none;
      border-top: var(--crema-border-width) solid var(--crema-border);
      margin: 16px 0;
    }
  </style>
</head>
<body>

  <h1>✿ Nouveau 테마 샘플</h1>
  <p style="margin-bottom: 24px;">2개 파일(types.ts + artnouveau.ts)에서 추출한 CSS 변수만으로 구성한 예시입니다.</p>

  <!-- 버튼 -->
  <div class="card">
    <h2>Button</h2>
    <div class="row">
      <button class="btn-primary">Primary</button>
      <button class="btn-accent">Accent</button>
      <button class="btn-outline">Outline</button>
    </div>
  </div>

  <!-- 배지 -->
  <div class="card">
    <h2>Badge</h2>
    <div class="row">
      <span class="badge badge-primary">New</span>
      <span class="badge badge-success">완료</span>
      <span class="badge badge-error">오류</span>
    </div>
  </div>

  <!-- 입력 -->
  <div class="card">
    <h2>Input</h2>
    <input type="text" placeholder="텍스트를 입력하세요" />
  </div>

  <!-- 진행바 -->
  <div class="card">
    <h2>Progress <span style="font-size:13px; font-weight:normal; opacity:.7">65%</span></h2>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- 카드 안 카드 -->
  <div class="card">
    <h2>중첩 카드</h2>
    <hr class="divider" />
    <p>CSS 변수는 하위 요소에 자동으로 상속됩니다.</p>
    <div class="card" style="margin-top:12px; margin-bottom:0;">
      <p>중첩된 카드도 동일한 테마 적용</p>
      <div class="row" style="margin-top:8px;">
        <span class="badge badge-primary">토큰 기반</span>
      </div>
    </div>
  </div>

</body>
</html>
